<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BestChess Server Analyzer V4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
<style>
:root{
  --bg:#071221;--panel:rgba(12,28,52,.88);--panel2:rgba(22,42,72,.84);--line:rgba(255,255,255,.10);
  --text:#f1f6ff;--muted:#9fb1d1;--green:#8bd464;--book:#d2a06c;--cyan:#27d1c5;--blue:#8db9ec;
  --yellow:#e0c45d;--orange:#f5a052;--red:#ff6860;--deep:#ff3e37;--good:#8eb0cc;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#183664 0,#071221 38%,#050b15 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;touch-action:manipulation} body{padding:12px}.app{max-width:1180px;margin:auto;display:flex;flex-direction:column;gap:12px}.card{border:1px solid var(--line);border-radius:22px;background:var(--panel);box-shadow:0 18px 45px rgba(0,0,0,.25);backdrop-filter:blur(18px)}.top{padding:20px}.title{font-size:26px;font-weight:900}.sub{color:var(--muted);font-size:15px;margin-top:5px;line-height:1.35}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.chip{padding:9px 13px;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;color:#cbd8ef;font-weight:800;font-size:14px}.input{padding:16px;display:grid;gap:12px}textarea{width:100%;min-height:150px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.06);color:var(--text);font-size:15px;padding:14px;resize:vertical;outline:none}.input-row{display:grid;grid-template-columns:220px 1fr 1fr;gap:10px}select,.btn{height:54px;border-radius:17px;border:1px solid var(--line);font-size:16px;font-weight:900}select{background:rgba(255,255,255,.08);color:var(--text);padding:0 14px}.btn{cursor:pointer}.btn.green{background:linear-gradient(180deg,#a2e575,#69bd4c);color:#10200b;border:0}.btn.dark{background:rgba(255,255,255,.08);color:#fff}.status{padding:14px 16px;color:#dce7ff;font-weight:800}.bar{height:12px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08);margin-top:10px}.bar>div{height:100%;width:0%;background:linear-gradient(90deg,#6dd856,#d6ee71);transition:.2s}.summary{padding:16px;background:linear-gradient(180deg,rgba(8,20,38,.95),rgba(6,13,25,.95));display:none}.summary-grid{display:grid;grid-template-columns:180px 1fr 80px 1fr;gap:11px;align-items:center}.player{text-align:center;font-weight:900}.avatar{margin:8px auto 0;width:92px;height:92px;border-radius:16px;background:linear-gradient(180deg,#f4f6fb,#d9e2ee);display:grid;place-items:center;color:#777;font-size:44px}.avatar.w{outline:4px solid var(--green)}.label{font-weight:900;color:#fff}.val{justify-self:center;min-width:110px;text-align:center;padding:12px 8px;border-radius:14px;background:rgba(255,255,255,.07);font-size:26px;font-weight:1000}.val.active{background:#fff;color:#000}.mid{width:46px;height:46px;border-radius:999px;display:grid;place-items:center;font-weight:1000;color:white;justify-self:center}.cat-book{background:var(--book)}.cat-brilliant{background:var(--cyan)}.cat-great{background:var(--blue)}.cat-best{background:var(--green)}.cat-excellent{background:#79c976}.cat-good{background:var(--good)}.cat-inaccuracy{background:var(--yellow);color:#372600}.cat-mistake{background:var(--orange)}.cat-miss{background:var(--red)}.cat-blunder{background:var(--deep)}.num{font-size:22px;font-weight:1000;text-align:center}.divider{grid-column:1/-1;height:1px;background:var(--line);margin:6px 0}.work{display:grid;grid-template-columns:minmax(320px,560px) 1fr;gap:12px}.board-card{padding:12px}.board-wrap{position:relative;width:100%;max-width:560px;margin:auto}#board{width:100%;border-radius:18px;overflow:hidden}.square-badge{position:absolute;right:3px;top:3px;min-width:24px;height:24px;padding:0 5px;border-radius:999px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:1000;z-index:50;box-shadow:0 4px 9px rgba(0,0,0,.32);pointer-events:none}.hl{box-shadow:inset 0 0 0 4px rgba(255,215,75,.76)!important}.details{padding:16px}.speech{margin-bottom:14px;background:#fff;color:#222;border-radius:18px;padding:14px 16px;font-size:20px;font-weight:900;display:flex;justify-content:space-between;gap:10px;align-items:center}.speech .small{font-size:14px;color:#666;font-weight:800}.move-strip{display:flex;gap:8px;overflow:auto;padding:10px 4px}.move-token{position:relative;min-width:66px;text-align:center;padding:10px 8px;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-weight:900;cursor:pointer}.move-token.active{background:rgba(136,210,102,.20);border-color:rgba(136,210,102,.8)}.move-token .corner{position:absolute;right:-5px;top:-7px;width:23px;height:23px;border-radius:999px;display:grid;place-items:center;font-size:11px;color:#fff}.moves-list{display:grid;gap:8px;max-height:490px;overflow:auto}.move-row{display:grid;grid-template-columns:42px 1fr 1fr;gap:8px}.ply{color:var(--muted);font-weight:900;text-align:center;padding-top:16px}.move-card{position:relative;border-radius:16px;padding:12px 35px 12px 12px;background:rgba(255,255,255,.055);border:1px solid var(--line);cursor:pointer;min-height:58px}.move-card.active{background:rgba(136,210,102,.16);border-color:rgba(136,210,102,.65)}.move-card b{display:block;font-size:17px}.move-card span{display:block;color:var(--muted);font-size:13px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.move-card .corner{position:absolute;right:7px;top:7px;width:28px;height:28px;border-radius:999px;display:grid;place-items:center;font-weight:1000;color:white}.graph{height:100px;background:rgba(255,255,255,.04);border-radius:14px;margin-top:12px;position:relative;overflow:hidden}.point{position:absolute;width:10px;height:10px;border-radius:999px;transform:translate(-50%,-50%);background:#8bd464}.line{position:absolute;height:2px;background:rgba(139,212,100,.65);transform-origin:left center}@media(max-width:800px){body{padding:8px}.input-row{grid-template-columns:1fr}.work{grid-template-columns:1fr}.summary-grid{grid-template-columns:118px 1fr 54px 1fr;gap:9px}.avatar{width:70px;height:70px;font-size:34px}.label{font-size:14px}.val{min-width:86px;font-size:22px}.mid{width:40px;height:40px}.move-row{grid-template-columns:34px 1fr 1fr}.title{font-size:22px}}
</style>
</head>
<body>
<div class="app">
 <div class="card top">
   <div class="title">Chess Analyzer Pro Server V4</div>
   <div class="sub">Одинаковый отчёт на всех устройствах: анализ делает серверный Stockfish с фиксированными настройками.</div>
   <div class="chips"><div class="chip" id="engineChip">Движок: проверка...</div><div class="chip">Режим: серверный</div><div class="chip" id="depthChip">Глубина: 16</div></div>
 </div>
 <div class="card input">
  <textarea id="pgn" placeholder="Вставь PGN партии сюда..."></textarea>
  <div class="input-row">
    <select id="depth"><option value="12">Глубина 12 — быстро</option><option value="14">Глубина 14 — нормально</option><option value="16" selected>Глубина 16 — оптимально</option><option value="18">Глубина 18 — долго</option></select>
    <button class="btn green" id="analyzeBtn">Сделать полный анализ</button>
    <button class="btn dark" id="sampleBtn">Вставить пример</button>
  </div>
  <div>Первый анализ может идти долго. Второй раз та же партия откроется из кэша.</div>
 </div>
 <div class="card status"><div id="statusText">Готов.</div><div class="bar"><div id="bar"></div></div></div>

 <div class="card summary" id="summary">
  <div class="summary-grid" id="summaryGrid"></div>
 </div>

 <div class="work">
  <div class="card board-card"><div class="board-wrap"><div id="board"></div></div><div class="graph" id="graph"></div></div>
  <div class="card details">
   <div class="speech"><div id="moveTitle">Загрузи партию</div><div class="small" id="moveEval">—</div></div>
   <div class="move-strip" id="strip"></div>
   <div class="moves-list" id="movesList"></div>
  </div>
 </div>
</div>
<script>
let board=null, report=null, current=0, game=null;
const CAT={book:'cat-book',brilliant:'cat-brilliant',great:'cat-great',best:'cat-best',excellent:'cat-excellent',good:'cat-good',inaccuracy:'cat-inaccuracy',mistake:'cat-mistake',miss:'cat-miss',blunder:'cat-blunder'};
const names={book:'Книжный',brilliant:'Блестящий',great:'Замечательный',best:'Лучший',excellent:'Отличный',good:'Хороший',inaccuracy:'Неточность',mistake:'Ошибка',miss:'Упущенная возможность',blunder:'Зевок'};
const icons={book:'📖',brilliant:'!!',great:'!',best:'★',excellent:'✓',good:'•',inaccuracy:'?!',mistake:'?',miss:'✕',blunder:'??'};
function $(id){return document.getElementById(id)}
function setStatus(t,p){$('statusText').textContent=t;if(p!=null)$('bar').style.width=p+'%'}
function initBoard(){board=Chessboard('board',{position:'start',pieceTheme:'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'});window.addEventListener('resize',()=>board.resize())}
async function check(){try{let r=await fetch('/api/status');let j=await r.json();$('engineChip').textContent=j.ok?'Движок: найден':'Движок: не найден'}catch(e){$('engineChip').textContent='Движок: ошибка'}}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function cpText(cp){if(Math.abs(cp)>=90000)return cp>0?'Мат у белых':'Мат у чёрных';return (cp/100).toFixed(2)}
function renderSummary(){let s=report.summary, h=report.headers;let cats=['book','brilliant','great','best','excellent','good','inaccuracy','mistake','miss','blunder'];let html=`<div class="label">Шахматисты</div><div class="player">${esc(h.white)}<div class="avatar w">♙</div></div><div></div><div class="player">${esc(h.black)}<div class="avatar">♟</div></div>`;
html+=`<div class="label">Точность</div><div class="val active">${s.accuracy.w}</div><div></div><div class="val">${s.accuracy.b}</div><div class="divider"></div>`;
for(const c of cats){html+=`<div class="label">${names[c]}</div><div class="num">${s.counts.w[c]||0}</div><div class="mid ${CAT[c]}">${icons[c]}</div><div class="num">${s.counts.b[c]||0}</div>`}
html+=`<div class="divider"></div><div class="label">Рейтинг партии</div><div class="val active">${s.rating.w}</div><div></div><div class="val">${s.rating.b}</div>`;
$('summaryGrid').innerHTML=html;$('summary').style.display='block'}
function renderMoves(){let list='', strip='';for(let i=0;i<report.moves.length;i+=2){let n=Math.floor(i/2)+1;let w=report.moves[i], b=report.moves[i+1];list+=`<div class="move-row"><div class="ply">${n}.</div>${moveCard(w,i)}${b?moveCard(b,i+1):'<div></div>'}</div>`}
report.moves.forEach((m,i)=>{strip+=`<div class="move-token ${i===current?'active':''}" onclick="go(${i})">${esc(m.san)}<div class="corner ${CAT[m.category]}">${icons[m.category]}</div></div>`});
$('movesList').innerHTML=list;$('strip').innerHTML=strip}
function moveCard(m,i){return `<div class="move-card ${i===current?'active':''}" onclick="go(${i})"><b>${esc(m.san)}</b><span>${esc(m.category_label)} • потеря ${m.loss} cp</span><div class="corner ${CAT[m.category]}">${icons[m.category]}</div></div>`}
function addBoardBadge(m){document.querySelectorAll('.square-badge').forEach(x=>x.remove());document.querySelectorAll('.hl').forEach(x=>x.classList.remove('hl'));let to=document.querySelector('.square-'+m.to), from=document.querySelector('.square-'+m.from);if(from)from.classList.add('hl');if(to){to.classList.add('hl');let b=document.createElement('div');b.className='square-badge '+CAT[m.category];b.textContent=icons[m.category];to.style.position='relative';to.appendChild(b)}}
function go(i){current=Math.max(0,Math.min(report.moves.length-1,i));let m=report.moves[current];board.position(m.after_fen,false);addBoardBadge(m);$('moveTitle').innerHTML=`${esc(m.san)} - ${esc(m.category_label)} <span style="color:#777;font-size:15px">лучше: ${esc(m.best_san)}</span>`;$('moveEval').textContent=cpText(m.eval_after_white);renderMoves();renderGraph()}
function renderGraph(){let g=$('graph');g.innerHTML='';if(!report||!report.evals_white.length)return;let vals=report.evals_white.map(x=>Math.max(-1000,Math.min(1000,x)));for(let i=0;i<vals.length;i++){let x=5+i*(90/Math.max(1,vals.length-1));let y=50-(vals[i]/1000)*42;let p=document.createElement('div');p.className='point';p.style.left=x+'%';p.style.top=y+'%';if(i===current)p.style.background='#ffd34d';g.appendChild(p);if(i>0){let x0=5+(i-1)*(90/Math.max(1,vals.length-1));let y0=50-(vals[i-1]/1000)*42;let dx=x-x0,dy=y-y0;let l=document.createElement('div');l.className='line';l.style.left=x0+'%';l.style.top=y0+'%';l.style.width=Math.sqrt(dx*dx+dy*dy)+'%';l.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;g.appendChild(l)}}}
async function analyze(){let pgn=$('pgn').value.trim();if(!pgn){alert('Вставь PGN');return}$('analyzeBtn').disabled=true;setStatus('Сервер анализирует партию. Не закрывай страницу...',15);try{let r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pgn,depth:parseInt($('depth').value)})});let j=await r.json();if(!j.ok)throw new Error(j.error||'Ошибка анализа');report=j;current=0;setStatus('Анализ готов. Отчёт построен.',100);renderSummary();renderMoves();go(0)}catch(e){setStatus('Ошибка: '+e.message,0);alert(e.message)}finally{$('analyzeBtn').disabled=false}}
$('analyzeBtn').onclick=analyze;$('depth').onchange=()=>$('depthChip').textContent='Глубина: '+$('depth').value;$('sampleBtn').onclick=()=>{$('pgn').value='[Event "Example"]\n[White "White"]\n[Black "Black"]\n[Result "*"]\n\n1. e4 e5 2. Nf3 Nc6 3. Bb5 a6 4. Ba4 Nf6 5. O-O Be7 *'};
document.addEventListener('touchend',(()=>{let last=0;return e=>{let now=Date.now();if(now-last<300)e.preventDefault();last=now}})(),{passive:false});
initBoard();check();
</script>
</body>
</html>
